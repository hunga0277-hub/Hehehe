<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Valentine</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #FFB6C1;
      font-family: Arial;
    }

    .card {
      width: 720px;
      background: white;
      border-radius: 25px;
      padding: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .avatar {
      width: 260px;
      height: 440px;
      object-fit: contain;
      display: block;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: #000;
    }

    h1 {
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    button {
      padding: 16px 36px;
      font-size: 18px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }

    #yes {
      background: #2ecc71;
      color: white;
    }

    #no {
      background: #e74c3c;
      color: white;
      position: absolute;
    }

    .hidden {
      display: none;
    }

    .result-img {
      width: 220px;
      height: 400px;
      object-fit: contain;
      margin: 0 auto 20px;
      display: block;
      border-radius: 16px;
      background: #000;
    }
  </style>
</head>

<body>

  <div class="card" id="card">
    <img src="avatar.jpg" class="avatar">
    <h1>Will you be my valentine? 💖</h1>

    <div class="buttons">
      <button id="yes">Yes</button>
      <button id="no">No</button>
    </div>
  </div>

  <div class="card hidden" id="result">
    <img src="result.jpg" class="result-img">
    <h1>
      I knew you say yes 😏 <br>
      And yet, they say I got no rizz 😎
    </h1>
  </div>

  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const card = document.getElementById("card");

    const yesRect = yesBtn.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();

    let x = yesRect.right - cardRect.left + 20;
    let y = yesRect.top - cardRect.top;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    document.addEventListener("mousemove", (e) => {

      const rect = noBtn.getBoundingClientRect();
      const btnX = rect.left + rect.width / 2;
      const btnY = rect.top + rect.height / 2;

      const dx = btnX - e.clientX;
      const dy = btnY - e.clientY;

      const dist = Math.hypot(dx, dy);

      if (dist < 160) {

        const angle = Math.atan2(dy, dx);

        const move = 180;

        x += Math.cos(angle) * move;
        y += Math.sin(angle) * move;

        const maxX = card.clientWidth - noBtn.offsetWidth;
        const maxY = card.clientHeight - noBtn.offsetHeight;

        x = Math.max(0, Math.min(maxX, x));
        y = Math.max(0, Math.min(maxY, y));

        noBtn.style.transition = "left 0.25s ease, top 0.25s ease";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
      }
    });

    yesBtn.onclick = () => {
      document.getElementById("card").classList.add("hidden");
      document.getElementById("result").classList.remove("hidden");
    };
  </script>

  <!-- AUDIO -->
  <audio id="bg-music" src="music.mp3" preload="auto" loop muted></audio>

  <!-- AUTOPLAY -->
  <script>
    const music = document.getElementById("bg-music");

    window.addEventListener("pageshow", () => {
      if (!music) return;

      music.currentTime = 0;

      music.play().then(() => {
        setTimeout(() => {
          music.muted = false;
        }, 150);
      }).catch(() => {
        const start = () => {
          music.currentTime = 0;
          music.muted = false;
          music.play();
        };
        document.addEventListener("click", start, { once: true });
      });
    });
  </script>

</body>
</html>
